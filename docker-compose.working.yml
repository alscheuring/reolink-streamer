# Working Docker Compose - builds assets at runtime
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.working
    container_name: reolink-streamer-working
    ports:
      - "8080:80"
    volumes:
      # Mount source for development
      - .:/var/www/html
      # Exclude node_modules and vendor to use container versions
      - /var/www/html/node_modules
      - /var/www/html/vendor
      # Persist database
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    restart: unless-stopped
    networks:
      - reolink-network

networks:
  reolink-network:
    driver: bridge